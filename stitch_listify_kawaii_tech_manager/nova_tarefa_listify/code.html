<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(131, 28, 145, 0.6);
        }
        .gradient-track {
            background: linear-gradient(90deg, #ffafd5 0%, #831c91 100%);
        }
        body {
            background-color: #1a0046;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(131, 28, 145, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(252, 170, 255, 0.1) 0%, transparent 40%);
            min-height: 100vh;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="text-on-surface flex flex-col font-body-md antialiased overflow-x-hidden">
<!-- Top Navigation Shell (Manual Implementation for Task Focus) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-container-padding h-20 bg-surface/20 backdrop-blur-md border-b border-white/10">
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">Criar Nova Tarefa</h1>
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-card hover:scale-95 transition-transform active:scale-90">
<span class="material-symbols-outlined text-primary" data-icon="close">close</span>
</button>
</header>
<main class="mt-24 px-container-padding pb-32 flex-1 flex flex-col gap-lg">
<!-- Input Section -->
<section class="w-full">
<div class="glass-card rounded-xl p-md shadow-2xl">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-headline-md font-headline-md text-on-surface placeholder:text-on-surface-variant/40 resize-none h-32" placeholder="O que vamos realizar hoje?"></textarea>
</div>
</section>
<!-- Calendar Section -->
<section class="flex flex-col gap-sm">
<h2 class="font-label-md text-label-md text-primary px-2">QUANDO?</h2>
<div class="flex justify-between items-center gap-base overflow-x-auto pb-xs">
<!-- Days loop simulation -->
<div class="flex flex-col items-center gap-xs min-w-[56px] py-4 rounded-full glass-card border-white/10 opacity-60">
<span class="font-label-sm text-label-sm opacity-50">SEG</span>
<span class="font-headline-md text-headline-md">12</span>
</div>
<div class="flex flex-col items-center gap-xs min-w-[56px] py-4 rounded-full glass-card border-white/10 opacity-60">
<span class="font-label-sm text-label-sm opacity-50">TER</span>
<span class="font-headline-md text-headline-md">13</span>
</div>
<!-- Selected Day -->
<div class="flex flex-col items-center gap-xs min-w-[64px] py-5 rounded-full bg-primary-container neon-glow border border-primary/30">
<span class="font-label-sm text-label-sm text-on-primary-container">QUA</span>
<span class="font-headline-md text-headline-md text-white">14</span>
</div>
<div class="flex flex-col items-center gap-xs min-w-[56px] py-4 rounded-full glass-card border-white/10 opacity-60">
<span class="font-label-sm text-label-sm opacity-50">QUI</span>
<span class="font-headline-md text-headline-md">15</span>
</div>
<div class="flex flex-col items-center gap-xs min-w-[56px] py-4 rounded-full glass-card border-white/10 opacity-60">
<span class="font-label-sm text-label-sm opacity-50">SEX</span>
<span class="font-headline-md text-headline-md">16</span>
</div>
<div class="flex flex-col items-center gap-xs min-w-[56px] py-4 rounded-full glass-card border-white/10 opacity-60">
<span class="font-label-sm text-label-sm opacity-50">SAB</span>
<span class="font-headline-md text-headline-md">17</span>
</div>
</div>
</section>
<!-- Category Grid -->
<section class="flex flex-col gap-sm">
<h2 class="font-label-md text-label-md text-primary px-2">CATEGORIA</h2>
<div class="grid grid-cols-2 gap-gutter">
<button class="flex items-center gap-sm p-sm rounded-full glass-card border-white/20 hover:bg-white/10 transition-colors group">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="work">work</span>
</div>
<span class="font-label-md text-label-md">Work</span>
</button>
<button class="flex items-center gap-sm p-sm rounded-full glass-card border-white/20 hover:bg-white/10 transition-colors group">
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center text-on-tertiary-container">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
</div>
<span class="font-label-md text-label-md">Study</span>
</button>
<button class="flex items-center gap-sm p-sm rounded-full glass-card border-white/20 hover:bg-white/10 transition-colors group">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="sports_esports">sports_esports</span>
</div>
<span class="font-label-md text-label-md">Leisure</span>
</button>
<button class="flex items-center gap-sm p-sm rounded-full glass-card border-white/20 hover:bg-white/10 transition-colors group">
<div class="w-10 h-10 rounded-full bg-error-container flex items-center justify-center text-error">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
</div>
<span class="font-label-md text-label-md">Health</span>
</button>
</div>
</section>
<!-- Urgency Slider -->
<section class="flex flex-col gap-md">
<div class="flex justify-between items-center px-2">
<h2 class="font-label-md text-label-md text-primary">NÍVEL DE URGÊNCIA</h2>
<span class="font-label-md text-label-md text-on-surface-variant">Alta</span>
</div>
<div class="relative w-full h-8 flex items-center">
<div class="absolute w-full h-4 gradient-track rounded-full opacity-40"></div>
<div class="absolute w-3/4 h-4 gradient-track rounded-full"></div>
<div class="absolute left-3/4 -translate-x-1/2 w-10 h-10 rounded-full bg-white border-4 border-primary-container shadow-xl"></div>
</div>
</section>

</div>

<footer class="fixed bottom-0 left-0 w-full p-container-padding pb-xl bg-gradient-to-t from-background to-transparent pointer-events-none">
<button class="pointer-events-auto w-full h-20 rounded-full bg-primary-container text-white font-headline-md text-headline-md uppercase tracking-widest neon-glow active:scale-95 transition-all hover:brightness-110 flex items-center justify-center gap-sm shadow-[0_0_30px_rgba(131,28,145,0.4)]">
            SALVAR TAREFA
